# GitHub Actions: 推送后自动部署到云服务器
# 
# 需要在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置：
#   SERVER_HOST     - 服务器 IP 地址
#   SERVER_USER     - SSH 登录用户名（通常是 root 或 ubuntu）
#   SERVER_SSH_KEY  - 服务器的 SSH 私钥（完整内容，包括 BEGIN/END 行）
#   SERVER_PORT     - SSH 端口（可选，默认 22）
#   DEPLOY_PATH     - 服务器上项目的绝对路径，如 /root/drone-logistics

name: Auto Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloud Server

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 30m
          script: |
            echo "========== 开始部署 =========="
            cd ${{ secrets.DEPLOY_PATH }}
            
            echo "[1/2] 拉取最新代码..."
            git fetch --all
            git reset --hard origin/main || git reset --hard origin/master
            
            echo "[2/2] 重启 Docker 容器..."
            docker compose up -d --build
            
            echo "========== 部署完成 $(date '+%Y-%m-%d %H:%M:%S') =========="

      - name: Notify on failure
        if: failure()
        run: echo "::error::部署失败！请检查 SSH 密钥和服务器配置"
